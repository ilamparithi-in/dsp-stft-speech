<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STFT Spectrogram Viewer</title>

  <!-- module shim: fft.js uses CommonJS (module.exports). Without this,
       the browser throws ReferenceError on that line and never assigns the
       FFT prototype methods, so createComplexArray() would not exist. -->
  <script>var module = { exports: {} };</script>

  <!-- fft.js via CDN — FFT computation backend used in script.js -->
  <script src="https://cdn.jsdelivr.net/npm/fft.js@4.0.4/lib/fft.js"></script>

  <!-- expose the export as a global so script.js can reach it -->
  <script>window.FFT = module.exports;</script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!--
    Layout: sidebar (controls) + main panel (spectrogram).
    This mirrors the two-pane convention used by tools like Audacity and MATLAB's
    Signal Analyzer — controls are always visible without scrolling, and the
    spectrogram occupies the maximum possible screen area.
  -->
  <div id="app">

    <!-- ── Left sidebar: all STFT parameters and file controls ── -->
    <aside id="sidebar">

      <!-- Application title — compact, monospaced, no decoration -->
      <div class="sidebar-title">
        <span class="title-main">STFT Viewer</span>
        <button id="sidebarToggle" class="btn-collapse" title="Collapse sidebar">&#xAB;</button>
      </div>

      <div class="sidebar-section">
        <button class="section-icon-btn" data-action="expand" title="Input file">&#8853;</button>
        <div class="section-label">INPUT</div>

        <!-- File selector: plain text label + native file input -->
        <div class="field">
          <label class="field-label" for="audioInput">Audio File</label>
          <!-- Hidden native input; the visible button triggers it -->
          <div class="file-row">
            <button class="btn-file" id="fileBtn" type="button">Browse…</button>
            <span id="fileNameDisplay" class="file-name">—</span>
          </div>
          <input type="file" id="audioInput" accept="audio/*" />
        </div>
      </div>

      <div class="sidebar-section">
        <button class="section-icon-btn" data-action="expand" title="Parameters">&#8801;</button>
        <div class="section-label">PARAMETERS</div>

        <!-- Each parameter follows the same label-above-input grid pattern -->
        <div class="field">
          <label class="field-label" for="frameSize">Frame Size</label>
          <!-- Free-form integer: validation is deferred to computeSTFT() which
               throws a descriptive error (e.g. non-power-of-2) rather than
               silently clamping here. -->
          <input type="number" id="frameSize" value="256" />
        </div>

        <div class="field">
          <label class="field-label" for="hopSize">Hop Size</label>
          <!-- Free-form integer: no UI enforcement of hop ≤ frame. -->
          <input type="number" id="hopSize" value="128" />
        </div>

        <div class="field">
          <label class="field-label" for="windowType">Window</label>
          <select id="windowType">
            <option value="rectangular">Rectangular</option>
            <option value="hann">Hann</option>
            <option value="hamming" selected>Hamming</option>
            <option value="blackman">Blackman</option>
          </select>
        </div>

        <div class="field">
          <label class="field-label" for="startTime">Start Time (s)</label>
          <!-- Offset into the loaded audio at which STFT analysis begins. -->
          <input type="number" id="startTime" value="0" step="0.01" />
        </div>

        <div class="field">
          <label class="field-label" for="segDuration">Segment Duration (s)</label>
          <!-- Length of audio to analyse. Validated by prepareSegment(). -->
          <input type="number" id="segDuration" value="10" step="0.01" />
        </div>
      </div>

      <!-- Audio metadata — populated after Run decodes the file -->
      <div class="sidebar-section">
        <button class="section-icon-btn" data-action="expand" title="Audio info">&#8505;</button>
        <div class="section-label">AUDIO INFO</div>
        <div class="field">
          <span class="field-label">Duration (s)</span>
          <span id="infoDuration" class="info-value">—</span>
        </div>
        <div class="field">
          <span class="field-label">Sample Rate (Hz)</span>
          <span id="infoSampleRate" class="info-value">—</span>
        </div>
      </div>

      <!-- Run button — full width of sidebar, styled as a functional control -->
      <div class="sidebar-section">
        <button class="section-icon-btn" data-action="run" title="Run STFT">&#9654;</button>
        <button id="processBtn" disabled>&#9654; Run</button>
      </div>

      <!-- Playback controls — enabled after spectrogram is rendered -->
      <div class="sidebar-section">
        <button class="section-icon-btn" data-action="play" title="Play / Stop">&#9835;</button>
        <div class="section-label">PLAYBACK</div>
        <button id="playBtn" disabled>&#9654; Play</button>
      </div>

      <!-- Status line at the bottom of the sidebar, not floating in the page -->
      <div id="statusBar" class="status-bar hidden">
        <span id="statusText"></span>
      </div>

    </aside>

    <!-- ── Right main panel: spectrogram canvas fills all remaining space ── -->
    <main id="mainPanel">

      <!--
        The canvas-wrapper uses position:relative so axis tick overlays can be
        added later without reflowing the canvas itself.
      -->
      <div id="canvasWrapper">
        <!-- Placeholder shown before first render -->
        <div id="placeholder">No data — load a file and press Run</div>

        <!--
          spectroGrid: CSS grid that positions the four panel areas.
          Columns: [y-axis 60px] [spectrogram 1fr] [colorbar 58px]
          Rows:    [main 1fr]    [x-axis 36px]
          Hidden until the first spectrogram is rendered.
        -->
        <div id="spectroGrid" class="hidden">

          <!-- Y-axis: frequency labels (Hz) — drawn by renderAxes() -->
          <canvas id="yAxisCanvas"></canvas>

          <!-- Spectrogram + playback cursor overlay -->
          <div id="spectroArea">
            <canvas id="spectrogramCanvas"></canvas>
            <!-- Zoom rectangle overlay: captures mouse/touch events; draws the
                 selection rectangle while the user drags a zoom region. -->
            <canvas id="zoomCanvas"></canvas>
            <!-- Cursor overlay: separate canvas so clearRect only erases the
                 cursor line, leaving the spectrogram pixel data untouched. -->
            <canvas id="cursorCanvas"></canvas>
            <!-- Reset-zoom button: floats top-right, visible only when zoomed -->
            <button id="resetZoomBtn" class="btn-reset-zoom hidden" title="Double-click spectrogram to reset zoom">&#8862; Reset</button>
          </div>

          <!-- Colorbar: power scale in dB — drawn by renderColorbar() -->
          <div id="colorbarArea">
            <canvas id="colorbarCanvas"></canvas>
          </div>

          <!-- X-axis: time labels (s) — drawn by renderAxes() -->
          <canvas id="xAxisCanvas"></canvas>

        </div>
      </div>

    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
